{% extends "Templates/base_footer" %}

{% block content %}
<div class="container-fluid bg-primary pt-3 min-vh-100 pb-5">
    <div class="mb-3">
        <a href="{{"admin/groups" | url}}" class="btn btn-light shadow-sm"><i class="bi bi-arrow-left"></i> Torna ai Gruppi</a>
    </div>

    <div class="card mt-4">
        <div class="card-body">
            <h5 class="card-title d-flex justify-content-between align-items-center">
                Foto per la Zona: {{ photogroup.name }}
                <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addPhotoModal">Aggiungi Foto alla Zona</button>
            </h5>
            <div class="table-responsive mt-3">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Titolo</th>
                            <th class="text-end">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in photos %}
                        <tr>
                            <td>{{ p.id }}</td>
                            <td>{{ p.title }}</td>
                            <td class="text-end">
                                <button class="btn btn-warning shadow-sm" data-bs-toggle="modal" data-bs-target="#editPhotoModal{{ p.id }}"><i class="bi bi-pencil"></i></button>
                                <form action="{{"admin/removePhoto/" | url}}{{ p.id }}/{{ photogroup.id }}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-danger shadow-sm ms-1" onclick="return confirm('Sicuro di voler eliminare questa foto?');"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>

                        <!-- Edit Photo Modal -->
                        <div class="modal fade" id="editPhotoModal{{ p.id }}" tabindex="-1" aria-hidden="true">
                          <div class="modal-dialog text-dark">
                            <div class="modal-content text-start">
                              <form action="{{"admin/editPhoto/" | url}}{{ p.id }}/{{ photogroup.id }}" method="post">
                                  <div class="modal-header">
                                    <h5 class="modal-title">Modifica Foto</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                  </div>
                                  <div class="modal-body">
                                    <div class="mb-3">
                                      <label class="form-label">Titolo Foto</label>
                                      <input type="text" name="title" class="form-control" value="{{ p.title }}" required>
                                    </div>
                                  </div>
                                  <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                                    <button type="submit" class="btn btn-warning">Salva Modifiche</button>
                                  </div>
                              </form>
                            </div>
                          </div>
                        </div>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Photo Modal -->
    <div class="modal fade" id="addPhotoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog text-dark">
        <div class="modal-content text-start">
          <form action="{{"admin/addPhoto/" | url}}{{ photogroup.id }}" method="post">
              <div class="modal-header">
                <h5 class="modal-title">Aggiungi Nuova Foto per {{ photogroup.name }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">
                <div class="mb-3">
                  <label class="form-label">Titolo Foto</label>
                  <input type="text" name="title" class="form-control" required>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="submit" class="btn btn-success">Crea Foto</button>
              </div>
          </form>
        </div>
      </div>
    </div>
</div>
{% endblock %}
