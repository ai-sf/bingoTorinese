{% extends "Templates/base_footer" %}

{% block content %}
<div class="container-fluid bg-primary pt-3 min-vh-100 pb-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="corsivo text-white mb-0" style="font-size: 250%">Impostazioni</h1>
            <a href="{{"admin" | url}}" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <form action="{{"admin/settings/update" | url}}" method="post">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Chiave</th>
                                    <th>Valore</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for s in settings %}
                                <tr>
                                    <td>
                                        <code class="fw-bold">{{ s.name }}</code>
                                    </td>
                                    <td>
                                        <input type="text" name="settings[{{ s.id }}]" value="{{ s.value }}" class="form-control form-control-sm">
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-success shadow-sm">
                            <i class="bi bi-save me-2"></i>Salva Impostazioni
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
